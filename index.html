<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お母さんラクラク アプリ QR何でも読み取り版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6;
            color: #333333;
            background-color: #f2f8fc;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background-color: #64b5f6;
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        header h1 {
            margin: 0;
            font-size: 20px;
        }
        
        /* スマホ画面風コンテナ */
        .phone-mockup {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.08);
            border: 8px solid #444;
            overflow: hidden;
            position: relative;
            min-height: 520px;
        }
        .phone-header {
            background-color: #64b5f6;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            position: relative;
            font-size: 14px;
        }
        .phone-header .right-btn {
            position: absolute;
            right: 10px;
            top: 8px;
            background-color: white;
            color: #64b5f6;
            border: none;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
        }
        .phone-body {
            padding: 15px;
            min-height: 460px;
            position: relative;
            background-color: #f9f9f9;
        }
        
        /* 画面切り替え */
        .app-screen {
            display: none;
        }
        .app-screen.active {
            display: block;
        }
        
        /* 入力フォーム・ボタン */
        .input-label {
            display: block;
            margin-top: 40px;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
            font-size: 14px;
            color: #555;
        }
        .text-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
            font-size: 14px;
        }
        .primary-btn {
            background-color: #64b5f6;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            margin-bottom: 12px;
            display: block;
            font-size: 14px;
        }
        .primary-btn:active {
            opacity: 0.8;
        }
        .secondary-btn {
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            margin-bottom: 10px;
            display: block;
            font-size: 13px;
        }
        
        /* 友達アイテム */
        .friend-item {
            background: #fdfdfd;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #eaeaea;
            cursor: pointer;
            font-weight: bold;
            color: #444;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .friend-item:hover {
            background-color: #e3f2fd;
        }
        .friend-item::after {
            content: "💬 トーク";
            font-size: 10px;
            color: #64b5f6;
            background: white;
            padding: 2px 6px;
            border-radius: 10px;
            border: 1px solid #64b5f6;
        }

        /* 友達ゼロの時のメッセージ */
        .no-friends-box {
            color: #888;
            font-size: 12px;
            text-align: center;
            padding: 20px 10px;
            background: #f0f0f0;
            border-radius: 8px;
            border: 1px dashed #ccc;
            margin-bottom: 15px;
        }
        
        /* QRコード・カメラエリア */
        .qr-area, .camera-area, .error-area, .success-area {
            display: none;
            margin-top: 15px;
            background: white;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .qr-box {
            width: 128px;
            height: 128px;
            margin: 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* カメラ映像の描画エリア */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 200px;
            background: #333;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #preview-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 警告・成功ボックス */
        .error-box {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #ffcdd2;
        }
        .success-box {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #c8e6c9;
        }

        /* メッセージ履歴と送信枠 */
        .dynamic-chat-container {
            background-color: #eaeaea;
            border-radius: 12px;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid #ccc;
        }
        .chat-history {
            max-height: 150px;
            overflow-y: auto;
            background: white;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
        }
        .chat-bubble {
            background-color: #dcf8c6;
            padding: 6px 10px;
            border-radius: 12px;
            margin-bottom: 6px;
            font-size: 12px;
            width: fit-content;
            max-width: 90%;
            word-break: break-all;
            margin-left: auto;
        }
        .chat-no-message {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            padding: 10px 0;
        }
        
        .hint-text {
            font-size: 11px;
            color: #777;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>「お母さんラクラク」動作確認用</h1>
    </header>

    <div class="phone-mockup">
        
        <div id="screen-register" class="app-screen active">
            <div class="phone-header">お母さんラクラク</div>
            <div class="phone-body">
                <label class="input-label">名前を入力してね</label>
                <input type="text" id="username-input" class="text-input" placeholder="例：お母さん">
                <button class="primary-btn" onclick="submitName()">決定</button>
                <p class="hint-text">※名前を入力して「決定」を押すと進みます</p>
            </div>
        </div>

        <div id="screen-main" class="app-screen">
            <div class="phone-header">
                ホーム
                <button class="right-btn" onclick="toggleFriendSection()">友達</button>
            </div>
            <div class="phone-body">

                <div style="text-align: right; margin-bottom: 10px;">
                    <button onclick="clearAllData()" style="font-size: 10px; background: none; border: none; color: #aaa; cursor: pointer; text-decoration: underline;">アプリを初期化する</button>
                </div>

                <div id="friend-section" style="display:none; margin-top:10px; border-top:2px dashed #64b5f6; padding-top:15px;">
                    <span style="font-weight:bold; color:#1e88e5; font-size:13px;">【友達リスト】</span>
                    <p style="font-size:11px; color:#666; margin: 0 0 10px 0;">名前を押すとメッセージ履歴と送信欄が開きます</p>
                    
                    <div id="friend-list-box"></div>

                    <div id="dynamic-chat-placement"></div>

                    <div style="margin-top:20px;">
                        <button class="secondary-btn" onclick="openNewRegister()">+ 新規登録</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-add-friend" class="app-screen">
            <div class="phone-header">
                新規登録（友達追加）
                <button class="right-btn" style="background:#666; color:white;" onclick="clickBackButton()">戻る</button>
            </div>
            <div class="phone-body">
                <button class="primary-btn" onclick="showMyQR()">QRコードを出す</button>
                <button class="primary-btn" style="background-color:#5c6bc0;" onclick="startQRScan()">QRコードを読み取る</button>
                
                <div id="qr-display-area" class="qr-area">
                    <span style="font-size:12px; font-weight:bold; color:#555;"><span id="my-name-placeholder"></span> の友達追加QR</span>
                    <div id="qrcode" class="qr-box"></div>
                    <p style="font-size:11px; color:#777; margin:5px 0 0 0;">相手に読み取てもらってね！</p>
                    <button class="secondary-btn" style="margin-top:15px; font-size:11px; padding:5px;" onclick="simulatePartnerScanned()">【テスト】相手が読み取ってくれた！(例:妹)</button>
                </div>

                <div id="camera-scan-area" class="camera-area">
                    <div class="video-wrapper">
                        <video id="preview-video" playsinline></video>
                    </div>
                    <div style="font-size:11px; color:#555; margin-bottom:5px;">枠内に友達のQRコードを映してね</div>
                    <canvas id="hidden-canvas" style="display:none;"></canvas>
                    
                    <div style="margin-top:10px;">
                        <button class="secondary-btn" style="margin:0; font-size:11px;" onclick="stopCamera()">カメラを止める</button>
                    </div>
                </div>
                
                <div id="error-display-area" class="error-area">
                    <div class="error-box">
                        ⚠️ 読み取れませんでした。<br>もう一度試してください。
                    </div>
                </div>

                <div id="success-display-area" class="success-area">
                    <div class="success-box">
                        🤝 <span id="success-friend-name"></span> と友達登録しました！
                    </div>
                    <button class="primary-btn" style="margin-top:10px; font-size:12px; padding:8px;" onclick="backToMain()">友達リストに戻る</button>
                </div>

            </div>
        </div>

    </div>
</div>

<script>
    let registeredName = "";
    let friendList = []; 
    let chatHistoryData = {}; 
    let activeChatFriend = ""; 
    let qrGenerator = null;

    let localStream = null;
    let videoElement = null;
    let canvasElement = null;
    let canvasContext = null;
    let scanAnimationId = null;

    window.onload = function() {
        const savedName = localStorage.getItem("rakuraku_username");
        const savedFriends = localStorage.getItem("rakuraku_friends");
        const savedChats = localStorage.getItem("rakuraku_chats");

        if (savedName) {
            registeredName = savedName;
            document.getElementById('my-name-placeholder').innerText = registeredName;
            
            if (savedFriends) {
                friendList = JSON.parse(savedFriends);
            }
            if (savedChats) {
                chatHistoryData = JSON.parse(savedChats);
            }
            
            changeScreen('screen-main');
            updateFriendListUI();
        }
    };

    function changeScreen(screenId) {
        document.querySelectorAll('.app-screen').forEach(screen => {
            screen.classList.remove('active');
        });
        document.getElementById(screenId).classList.add('active');
    }

    function submitName() {
        const nameInput = document.getElementById('username-input').value.trim();
        if (nameInput === "") {
            alert("お名前を入力してね！");
            return;
        }
        registeredName = nameInput;
        localStorage.setItem("rakuraku_username", registeredName);

        document.getElementById('my-name-placeholder').innerText = registeredName;
        changeScreen('screen-main');
        updateFriendListUI();
    }

    function saveFriendsToStorage() {
        localStorage.setItem("rakuraku_friends", JSON.stringify(friendList));
    }

    function saveChatsToStorage() {
        localStorage.setItem("rakuraku_chats", JSON.stringify(chatHistoryData));
    }

    function toggleFriendSection() {
        const section = document.getElementById('friend-section');
        if (section.style.display === "none") {
            section.style.display = "block";
            document.getElementById('dynamic-chat-placement').innerHTML = "";
        } else {
            section.style.display = "none";
        }
    }

    function updateFriendListUI() {
        const listBox = document.getElementById('friend-list-box');
        listBox.innerHTML = ""; 
        
        if (friendList.length === 0) {
            const noFriends = document.createElement('div');
            noFriends.className = "no-friends-box";
            noFriends.innerText = "まだ友達が登録されていません。\n下の「新規登録」から追加してください。";
            listBox.appendChild(noFriends);
            
            document.getElementById('dynamic-chat-placement').innerHTML = "";
            return;
        }
        
        friendList.forEach(friend => {
            const div = document.createElement('div');
            div.className = "friend-item";
            div.innerText = "👤 " + friend;
            div.onclick = function() { openChat(friend); };
            listBox.appendChild(div);
        });
    }

    function openChat(friendName) {
        activeChatFriend = friendName;
        const placement = document.getElementById('dynamic-chat-placement');
        
        if (!chatHistoryData[friendName]) {
            chatHistoryData[friendName] = [];
        }

        let bubblesHtml = "";
        if (chatHistoryData[friendName].length === 0) {
            bubblesHtml = `<div class="chat-no-message">まだメッセージの履歴はありません</div>`;
        } else {
            chatHistoryData[friendName].forEach(msg => {
                bubblesHtml += `<div class="chat-bubble">${msg}</div>`;
            });
        }
        
        placement.innerHTML = `
            <div class="dynamic-chat-container">
                <div style="font-weight:bold; font-size:12px; margin-bottom:5px; color:#555;">💬 ${friendName} とのトーク履歴</div>
                <div class="chat-history" id="chat-history-box">
                    ${bubblesHtml}
                </div>
                <textarea id="chat-input" class="text-input" style="text-align:left; min-height:50px; margin-bottom:8px; font-size:13px;" placeholder="メッセージを入力"></textarea>
                <button class="primary-btn" style="margin:0; padding:6px; font-size:12px; width:80px; float:right;" onclick="sendMessage()">送信</button>
                <div style="clear:both;"></div>
            </div>
        `;
        
        const historyBox = document.getElementById('chat-history-box');
        historyBox.scrollTop = historyBox.scrollHeight;

        document.getElementById('chat-input').focus();
    }

    function sendMessage() {
        const chatInput = document.getElementById('chat-input');
        const text = chatInput.value.trim();
        if (text === "") { 
            alert("メッセージを入力してください！");
            return; 
        }
        
        if (!chatHistoryData[activeChatFriend]) {
            chatHistoryData[activeChatFriend] = [];
        }
        chatHistoryData[activeChatFriend].push(text);
        saveChatsToStorage();

        alert(activeChatFriend + " へメッセージを送信しました！\n\n内容：「" + text + "」");
        openChat(activeChatFriend);
    }

    function openNewRegister() {
        stopCamera();
        document.getElementById('qr-display-area').style.display = "none";
        document.getElementById('camera-scan-area').style.display = "none";
        document.getElementById('error-display-area').style.display = "none";
        document.getElementById('success-display-area').style.display = "none";
        changeScreen('screen-add-friend');
    }

    function backToMain() {
        stopCamera();
        changeScreen('screen-main');
    }

    function clickBackButton() {
        stopCamera();
        backToMain();
    }

    function showMyQR() {
        stopCamera();
        document.getElementById('camera-scan-area').style.display = "none";
        document.getElementById('error-display-area').style.display = "none";
        document.getElementById('success-display-area').style.display = "none";
        
        const qrBox = document.getElementById('qrcode');
        qrBox.innerHTML = ""; 
        
        qrGenerator = new QRCode(qrBox, {
            text: "okasan-app-user:" + registeredName,
            width: 128,
            height: 128,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        document.getElementById('qr-display-area').style.display = "block";
    }

    function startQRScan() {
        document.getElementById('qr-display-area').style.display = "none";
        document.getElementById('error-display-area').style.display = "none";
        document.getElementById('success-display-area').style.display = "none";
        document.getElementById('camera-scan-area').style.display = "block";

        videoElement = document.getElementById('preview-video');
        canvasElement = document.getElementById('hidden-canvas');
        canvasContext = canvasElement.getContext('2d');

        const constraints = {
            video: { facingMode: "environment" }
        };

        navigator.mediaDevices.getUserMedia(constraints)
            .then(function(stream) {
                localStream = stream;
                videoElement.srcObject = stream;
                videoElement.setAttribute("playsinline", true);
                videoElement.play();
                scanAnimationId = requestAnimationFrame(tickScan);
            })
            .catch(function(err) {
                console.error("カメラの起動に失敗しました: ", err);
                alert("カメラを起動できませんでした。ブラウザのカメラ許可設定を確認してください。");
                document.getElementById('camera-scan-area').style.display = "none";
            });
    }

    // 【完全デバッグ】QRコードのデータを何でも受け付けるように制限を解除
    function tickScan() {
        if (videoElement && videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
            canvasElement.height = videoElement.videoHeight;
            canvasElement.width = videoElement.videoWidth;
            canvasContext.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            
            const imageData = canvasContext.getImageData(0, 0, canvasElement.width, canvasElement.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: "dontInvert",
            });

            if (code) {
                let qrText = code.data.trim();
                if (qrText !== "") {
                    stopCamera();
                    
                    // もしアプリ独自のプレフィックスがついていたら外す
                    if (qrText.startsWith("okasan-app-user:")) {
                        qrText = qrText.replace("okasan-app-user:", "");
                    }
                    
                    // URLなどの長い文字列だった場合は、見やすいように先頭の15文字だけを切り出す
                    if (qrText.length > 15) {
                        qrText = qrText.substring(0, 15) + "...";
                    }

                    // 友達追加の処理へ進む
                    addFriendDirect(qrText);
                    return;
                }
            }
        }
        if (localStream) {
            scanAnimationId = requestAnimationFrame(tickScan);
        }
    }

    function stopCamera() {
        if (scanAnimationId) {
            cancelAnimationFrame(scanAnimationId);
            scanAnimationId = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (videoElement) {
            videoElement.srcObject = null;
        }
    }

    function addFriendDirect(newFriendName) {
        document.getElementById('camera-scan-area').style.display = "none";
        if (!friendList.includes(newFriendName)) {
            friendList.push(newFriendName);
            saveFriendsToStorage();
        }
        updateFriendListUI();
        document.getElementById('success-friend-name').innerText = newFriendName;
        document.getElementById('success-display-area').style.display = "block";
    }

    function simulatePartnerScanned() {
        document.getElementById('qr-display-area').style.display = "none";
        const partnerName = "妹"; 
        if (!friendList.includes(partnerName)) {
            friendList.push(partnerName);
            saveFriendsToStorage();
        }
        updateFriendListUI();
        document.getElementById('success-friend-name').innerText = partnerName;
        document.getElementById('success-display-area').style.display = "block";
    }

    function clearAllData() {
        if (confirm("名前、友達、メッセージ履歴を含むすべての保存データを消去して、初期状態に戻しますか？")) {
            localStorage.clear();
            alert("すべてのデータを消去しました。");
            location.reload();
        }
    }
</script>

</body>
</html>
