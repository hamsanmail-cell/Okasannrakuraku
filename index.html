<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お母さんラクラク アプリ スプレッドシート通信版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: sans-serif; line-height: 1.6; color: #333; background-color: #f2f8fc; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        header { background-color: #64b5f6; color: white; padding: 15px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header h1 { margin: 0; font-size: 20px; }
        .phone-mockup { background: white; border-radius: 24px; box-shadow: 0 8px 16px rgba(0,0,0,0.08); border: 8px solid #444; overflow: hidden; position: relative; min-height: 520px; }
        .phone-header { background-color: #64b5f6; color: white; padding: 12px; text-align: center; font-weight: bold; position: relative; font-size: 14px; }
        .phone-header .right-btn { position: absolute; right: 10px; top: 8px; background-color: white; color: #64b5f6; border: none; padding: 4px 8px; border-radius: 12px; font-size: 11px; cursor: pointer; font-weight: bold; }
        .phone-body { padding: 15px; min-height: 460px; position: relative; background-color: #f9f9f9; }
        .app-screen { display: none; }
        .app-screen.active { display: block; }
        .input-label { display: block; margin-top: 40px; margin-bottom: 15px; font-weight: bold; text-align: center; font-size: 14px; color: #555; }
        .text-input { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; outline: none; text-align: center; font-size: 14px; }
        .primary-btn { background-color: #64b5f6; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; margin-bottom: 12px; display: block; font-size: 14px; }
        .secondary-btn { background-color: #f0f0f0; color: #333; border: 1px solid #ccc; width: 100%; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; margin-bottom: 10px; display: block; font-size: 13px; }
        .friend-item { background: #fdfdfd; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #eaeaea; cursor: pointer; font-weight: bold; color: #444; display: flex; justify-content: space-between; align-items: center; }
        .friend-item::after { content: "💬 トーク"; font-size: 10px; color: #64b5f6; background: white; padding: 2px 6px; border-radius: 10px; border: 1px solid #64b5f6; }
        .no-friends-box { color: #888; font-size: 12px; text-align: center; padding: 20px 10px; background: #f0f0f0; border-radius: 8px; border: 1px dashed #ccc; margin-bottom: 15px; }
        .qr-area, .camera-area, .error-area, .success-area { display: none; margin-top: 15px; background: white; border: 1px solid #ddd; padding: 12px; border-radius: 8px; text-align: center; }
        .qr-box { width: 128px; height: 128px; margin: 15px auto; display: flex; justify-content: center; align-items: center; }
        .video-wrapper { position: relative; width: 100%; height: 200px; background: #333; border-radius: 8px; overflow: hidden; margin-bottom: 10px; }
        #preview-video { width: 100%; height: 100%; object-fit: cover; }
        .success-box { background-color: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 6px; font-size: 12px; font-weight: bold; border: 1px solid #c8e6c9; }
        .dynamic-chat-container { background-color: #eaeaea; border-radius: 12px; padding: 12px; margin-top: 15px; border: 1px solid #ccc; }
        .chat-history { max-height: 150px; overflow-y: auto; background: white; border-radius: 6px; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; }
        
        .chat-row { display: flex; margin-bottom: 6px; width: 100%; }
        .chat-row.me { justify-content: flex-end; }
        .chat-row.partner { justify-content: flex-start; }
        .chat-bubble { padding: 6px 10px; border-radius: 12px; font-size: 12px; max-width: 80%; word-break: break-all; }
        .chat-row.me .chat-bubble { background-color: #dcf8c6; }
        .chat-row.partner .chat-bubble { background-color: #ffffff; border: 1px solid #ddd; }
        .chat-name-label { font-size: 9px; color: #777; margin-bottom: 2px; display: block; }
        
        .chat-no-message { font-size: 11px; color: #aaa; text-align: center; padding: 10px 0; }
        .hint-text { font-size: 11px; color: #777; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>「お母さんラクラク」本物通信版</h1>
    </header>

    <div class="phone-mockup">
        <div id="screen-register" class="app-screen active">
            <div class="phone-header">お母さんラクラク</div>
            <div class="phone-body">
                <label class="input-label">名前を入力してね</label>
                <input type="text" id="username-input" class="text-input" placeholder="例：お母さん">
                <button class="primary-btn" onclick="submitName()">決定</button>
            </div>
        </div>

        <div id="screen-main" class="app-screen">
            <div class="phone-header">
                ホーム
                <button class="right-btn" onclick="toggleFriendSection()">友達</button>
            </div>
            <div class="phone-body">
                <div style="text-align: right; margin-bottom: 10px;">
                    <button onclick="clearAllData()" style="font-size: 10px; background: none; border: none; color: #aaa; cursor: pointer; text-decoration: underline;">初期化</button>
                </div>
                <div id="friend-section" style="display:none; margin-top:10px; border-top:2px dashed #64b5f6; padding-top:15px;">
                    <span style="font-weight:bold; color:#1e88e5; font-size:13px;">【友達リスト】</span>
                    <div id="friend-list-box"></div>
                    <div id="dynamic-chat-placement"></div>
                    <div style="margin-top:20px;">
                        <button class="secondary-btn" onclick="openNewRegister()">+ 新規登録</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-add-friend" class="app-screen">
            <div class="phone-header">
                新規登録（友達追加）
                <button class="right-btn" style="background:#666; color:white;" onclick="clickBackButton()">戻る</button>
            </div>
            <div class="phone-body">
                <button class="primary-btn" onclick="showMyQR()">QRコードを出す</button>
                <button class="primary-btn" style="background-color:#5c6bc0;" onclick="startQRScan()">QRコードを読み取る</button>
                
                <div id="qr-display-area" class="qr-area">
                    <span style="font-size:12px; font-weight:bold; color:#555;"><span id="my-name-placeholder"></span> のQR</span>
                    <div id="qrcode" class="qr-box"></div>
                </div>

                <div id="camera-scan-area" class="camera-area">
                    <div class="video-wrapper"><video id="preview-video" playsinline></video></div>
                    <canvas id="hidden-canvas" style="display:none;"></canvas>
                    <button class="secondary-btn" onclick="stopCamera()">カメラを止める</button>
                </div>

                <div id="success-display-area" class="success-area">
                    <div class="success-box">🤝 <span id="success-friend-name"></span> と友達になりました！</div>
                    <button class="primary-btn" style="margin-top:10px;" onclick="backToMain()">友達リストに戻る</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🔴ここにスプレッドシートの「ウェブアプリURL」を貼り付けてください！
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx3Zf0t_A5A7s_MV2O2rWkNu2NUEZjpfjSWUX9lh4iV7bag5LruqolicVqLulz28_UdBw/exec";

    let registeredName = "";
    let friendList = []; 
    let activeChatFriend = ""; 
    let refreshIntervalId = null;

    let localStream = null;
    let videoElement = null;
    let canvasElement = null;
    let canvasContext = null;
    let scanAnimationId = null;

    window.onload = function() {
        const savedName = localStorage.getItem("rakuraku_username");
        const savedFriends = localStorage.getItem("rakuraku_friends");

        if (savedName) {
            registeredName = savedName;
            document.getElementById('my-name-placeholder').innerText = registeredName;
            if (savedFriends) friendList = JSON.parse(savedFriends);
            changeScreen('screen-main');
            updateFriendListUI();
        }
    };

    function changeScreen(screenId) {
        document.querySelectorAll('.app-screen').forEach(screen => screen.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        
        if (screenId !== 'screen-main' || !activeChatFriend) {
            if (refreshIntervalId) { clearInterval(refreshIntervalId); refreshIntervalId = null; }
        }
    }

    function submitName() {
        const nameInput = document.getElementById('username-input').value.trim();
        if (nameInput === "") return alert("名前を入力してね！");
        registeredName = nameInput;
        localStorage.setItem("rakuraku_username", registeredName);
        document.getElementById('my-name-placeholder').innerText = registeredName;
        changeScreen('screen-main');
        updateFriendListUI();
    }

    function toggleFriendSection() {
        const section = document.getElementById('friend-section');
        section.style.display = (section.style.display === "none") ? "block" : "none";
        if (section.style.display === "none" && refreshIntervalId) {
            clearInterval(refreshIntervalId);
        }
    }

    function updateFriendListUI() {
        const listBox = document.getElementById('friend-list-box');
        listBox.innerHTML = ""; 
        if (friendList.length === 0) {
            listBox.innerHTML = `<div class="no-friends-box">友達を追加してね</div>`;
            return;
        }
        friendList.forEach(friend => {
            const div = document.createElement('div');
            div.className = "friend-item";
            div.innerText = "👤 " + friend;
            div.onclick = function() { openChat(friend); };
            listBox.appendChild(div);
        });
    }

    function openChat(friendName) {
        activeChatFriend = friendName;
        
        if (refreshIntervalId) clearInterval(refreshIntervalId);
        fetchMessages(); 
        refreshIntervalId = setInterval(fetchMessages, 3000);

        const placement = document.getElementById('dynamic-chat-placement');
        placement.innerHTML = `
            <div class="dynamic-chat-container">
                <div style="font-weight:bold; font-size:12px; margin-bottom:5px;">💬 ${friendName} とのトーク</div>
                <div class="chat-history" id="chat-history-box">
                    <div class="chat-no-message">読み込み中...</div>
                </div>
                <textarea id="chat-input" class="text-input" style="text-align:left; min-height:40px; margin-bottom:8px;" placeholder="文字を入力"></textarea>
                <button class="primary-btn" style="margin:0; width:80px; float:right;" onclick="sendMessage()">送信</button>
                <div style="clear:both;"></div>
            </div>
        `;
    }

    function fetchMessages() {
        if (!GAS_URL || GAS_URL.startsWith("ここに")) return;

        fetch(GAS_URL)
        .then(response => response.json())
        .then(data => {
            const historyBox = document.getElementById('chat-history-box');
            if (!historyBox) return;

            const filtered = data.filter(msg => 
                (msg.sender === registeredName && msg.receiver === activeChatFriend) ||
                (msg.sender === activeChatFriend && msg.receiver === registeredName)
            );

            if (filtered.length === 0) {
                historyBox.innerHTML = `<div class="chat-no-message">まだメッセージはありません</div>`;
                return;
            }

            let html = "";
            filtered.forEach(msg => {
                const isMe = (msg.sender === registeredName);
                const rowClass = isMe ? "me" : "partner";
                const label = isMe ? "" : `<span class="chat-name-label">${msg.sender}</span>`;
                html += `
                    <div class="chat-row ${rowClass}">
                        <div>
                            ${label}
                            <div class="chat-bubble">${msg.message}</div>
                        </div>
                    </div>`;
            });

            historyBox.innerHTML = html;
            historyBox.scrollTop = historyBox.scrollHeight;
        })
        .catch(err => console.error("受信失敗:", err));
    }

    function sendMessage() {
        const chatInput = document.getElementById('chat-input');
        const text = chatInput.value.trim();
        if (text === "") return alert("メッセージを入れてね");
        if (!GAS_URL || GAS_URL.startsWith("ここに")) return alert("基地局URLが設定されていません");

        const payload = {
            sender: registeredName,
            receiver: activeChatFriend,
            message: text
        };

        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(resData => {
            if(resData.status === "success") {
                chatInput.value = "";
                fetchMessages();
            } else {
                alert("送信に失敗しました");
            }
        })
        .catch(err => alert("通信エラーが発生しました"));
    }

    function openNewRegister() { stopCamera(); changeScreen('screen-add-friend'); }
    function backToMain() { stopCamera(); changeScreen('screen-main'); }
    function clickBackButton() { stopCamera(); backToMain(); }

    function showMyQR() {
        stopCamera();
        const qrBox = document.getElementById('qrcode');
        qrBox.innerHTML = ""; 
        new QRCode(qrBox, { text: registeredName, width: 128, height: 128 });
        document.getElementById('qr-display-area').style.display = "block";
    }

    function startQRScan() {
        document.getElementById('qr-display-area').style.display = "none";
        document.getElementById('camera-scan-area').style.display = "block";
        videoElement = document.getElementById('preview-video');
        canvasElement = document.getElementById('hidden-canvas');
        canvasContext = canvasElement.getContext('2d');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(function(stream) {
            localStream = stream; videoElement.srcObject = stream; videoElement.setAttribute("playsinline", true); videoElement.play();
            scanAnimationId = requestAnimationFrame(tickScan);
        });
    }

    function tickScan() {
        if (videoElement && videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
            canvasElement.height = videoElement.videoHeight;
            canvasElement.width = videoElement.videoWidth;
            canvasContext.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            const imageData = canvasContext.getImageData(0, 0, canvasElement.width, canvasElement.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

            if (code) {
                let qrText = code.data.trim();
                if (qrText !== "") {
                    stopCamera();
                    if (qrText.length > 15) qrText = qrText.substring(0, 15) + "...";
                    document.getElementById('camera-scan-area').style.display = "none";
                    if (!friendList.includes(qrText)) {
                        friendList.push(qrText);
                        localStorage.setItem("rakuraku_friends", JSON.stringify(friendList));
                    }
                    updateFriendListUI();
                    document.getElementById('success-friend-name').innerText = qrText;
                    document.getElementById('success-display-area').style.display = "block";
                    return;
                }
            }
        }
        if (localStream) scanAnimationId = requestAnimationFrame(tickScan);
    }

    function stopCamera() {
        if (scanAnimationId) { cancelAnimationFrame(scanAnimationId); scanAnimationId = null; }
        if (localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; }
        if (videoElement) videoElement.srcObject = null;
    }

    function clearAllData() {
        if (confirm("初期化しますか？")) { localStorage.clear(); location.reload(); }
    }
</script>
</body>
</html>
